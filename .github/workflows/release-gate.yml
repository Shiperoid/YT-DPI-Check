# CI runs this file from the PR merge commit (branch protection applies to that run).
# If you cannot merge a workflow-only fix: push once to the default branch, or
# temporarily relax required checks / use admin bypass (repo Settings → Branches).
name: release-gate

on:
  push:
    paths:
      - 'YT-DPI.ps1'
      - 'tools/release-gate.ps1'
      - 'tools/release-gate.cmd'
      - 'tools/release-gate-quick.cmd'
      - 'tools/release-gate-addtype.ps1'
      - 'tools/smoke-yt-dpi-engines.ps1'
      - '.github/workflows/release-gate.yml'
      - 'CHANGELOG_ru.md'
      - 'README.md'
  # No paths filter on PR: branch protection expects this check on every PR; path-only
  # triggers leave required checks stuck at "Waiting for status to be reported".
  pull_request: {}

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-latest]
        pwsh_version: ['7.2.23', '7.4.15', 'latest']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell (pwsh on PATH for gate)
        uses: PSModule/install-powershell@v1
        with:
          Version: ${{ matrix.pwsh_version }}

      - name: Run release gate (orchestrator = PS 5.1; children = 5.1 x64/WOW64 + all pwsh candidates)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & (Join-Path $env:GITHUB_WORKSPACE 'tools\release-gate.ps1') -RepoRoot $env:GITHUB_WORKSPACE
