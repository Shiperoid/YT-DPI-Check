name: release-gate

on:
  push:
    paths:
      - 'YT-DPI.ps1'
      - 'tools/release-gate.ps1'
      - 'tools/release-gate-addtype.ps1'
      - 'tools/smoke-yt-dpi-engines.ps1'
      - '.github/workflows/release-gate.yml'
      - 'CHANGELOG_ru.md'
      - 'README.md'
  pull_request:
    paths:
      - 'YT-DPI.ps1'
      - 'tools/release-gate.ps1'
      - 'tools/release-gate-addtype.ps1'
      - 'tools/smoke-yt-dpi-engines.ps1'
      - '.github/workflows/release-gate.yml'
      - 'CHANGELOG_ru.md'
      - 'README.md'

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-latest]
        # Pinned + latest: bump minors periodically for reproducibility.
        pwsh_version: ['7.2.23', '7.4.15', 'latest']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # PowerShell/setup-powershell is not a resolvable public action; use PSModule/install-powershell.
      - name: Install PowerShell (pwsh on PATH for gate)
        uses: PSModule/install-powershell@v1
        with:
          Version: ${{ matrix.pwsh_version }}

      - name: Run release gate (orchestrator = PS 5.1; children = 5.1 x64/WOW64 + all pwsh candidates)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & (Join-Path $env:GITHUB_WORKSPACE 'tools\release-gate.ps1') -RepoRoot $env:GITHUB_WORKSPACE
